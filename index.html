<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urdu Learning Game for Kids 🎮</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🌟 Urdu Learning Game 🌟</h1>
            <p class="subtitle">Learn Urdu the Fun Way!</p>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-mode="read">📖 Read</button>
            <button class="tab-btn" data-mode="alphabet">🔤 Alphabet</button>
            <button class="tab-btn" data-mode="sentences">💬 Sentences</button>
            <button class="tab-btn" data-mode="syllables">📝 Syllables</button>
            <button class="tab-btn" data-mode="write">✏️ Write</button>
            <button class="tab-btn" data-mode="speak">🎤 Speak</button>
            <button class="tab-btn" data-mode="game">🎮 Game</button>
        </nav>

        <!-- Read Mode -->
        <section id="read-mode" class="mode active">
            <div class="read-container">
                <div class="urdu-display" id="urdu-display">
                    <div class="urdu-text" id="urdu-text">ا</div>
                    <div class="pronunciation" id="pronunciation">Alif</div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="prev-btn">⬅️ Previous</button>
                    <button class="btn btn-primary" id="play-audio-btn">🔊 Play Sound</button>
                    <button class="btn btn-primary" id="next-btn">Next ➡️</button>
                </div>
                <div class="mode-selector">
                    <label>Learn:</label>
                    <button class="btn btn-secondary active" data-type="letters">Letters</button>
                    <button class="btn btn-secondary" data-type="words">Words</button>
                </div>
            </div>
        </section>

        <!-- Alphabet Grid Mode -->
        <section id="alphabet-mode" class="mode">
            <div class="alphabet-container">
                <h2 class="section-title">🌟 Complete Urdu Alphabet 🌟</h2>
                <p class="section-subtitle">Click any letter to hear its pronunciation</p>
                <div class="alphabet-grid" id="alphabet-grid">
                    <!-- Alphabet grid will be generated by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Sentences Mode -->
        <section id="sentences-mode" class="mode">
            <div class="sentences-container">
                <div class="sentence-display" id="sentence-display">
                    <div class="sentence-urdu" id="sentence-urdu">یہ ایک گیند ہے</div>
                    <div class="sentence-meaning" id="sentence-meaning">This is a ball</div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="sentence-prev-btn">⬅️ Previous</button>
                    <button class="btn btn-primary" id="sentence-play-btn">🔊 Play Sound</button>
                    <button class="btn btn-primary" id="sentence-next-btn">Next ➡️</button>
                </div>
            </div>
        </section>

        <!-- Syllables Mode -->
        <section id="syllables-mode" class="mode">
            <div class="syllables-container">
                <div class="syllable-display" id="syllable-display">
                    <div class="syllable-parts" id="syllable-parts">با + ل</div>
                    <div class="syllable-word" id="syllable-word">بال</div>
                    <div class="syllable-meaning" id="syllable-meaning">Ball</div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="syllable-prev-btn">⬅️ Previous</button>
                    <button class="btn btn-primary" id="syllable-play-btn">🔊 Play Sound</button>
                    <button class="btn btn-primary" id="syllable-next-btn">Next ➡️</button>
                </div>
            </div>
        </section>

        <!-- Write Mode -->
        <section id="write-mode" class="mode">
            <div class="write-container">
                <div class="write-instruction">
                    <h2>Trace the letter:</h2>
                    <div class="target-letter" id="target-letter">ا</div>
                </div>
                <canvas id="drawing-canvas" width="400" height="400"></canvas>
                <div class="canvas-controls">
                    <button class="btn btn-danger" id="clear-btn">🗑️ Clear</button>
                    <button class="btn btn-primary" id="new-letter-btn">New Letter ✨</button>
                </div>
            </div>
        </section>

        <!-- Speak Mode -->
        <section id="speak-mode" class="mode">
            <div class="speak-container">
                <div class="speak-instruction">
                    <h2>Say the word:</h2>
                    <div class="word-to-speak" id="word-to-speak">سیب</div>
                    <div class="word-pronunciation" id="word-pronunciation">Seb (Apple)</div>
                </div>
                <div class="microphone-container">
                    <button class="btn btn-large btn-primary" id="mic-btn">
                        <span class="mic-icon">🎤</span>
                        <span class="mic-text">Click to Speak</span>
                    </button>
                </div>
                <div class="feedback" id="speak-feedback"></div>
                <div class="speak-controls">
                    <button class="btn btn-secondary" id="speak-again-btn" style="display: none;">🔄 Speak Again</button>
                    <button class="btn btn-secondary" id="new-word-btn">New Word ✨</button>
                    <button class="btn btn-secondary" id="test-audio-btn">🔊 Test Audio</button>
                </div>
            </div>
        </section>

        <!-- Game Mode -->
        <section id="game-mode" class="mode">
            <div class="game-container">
                <div class="game-header">
                    <div class="score-display">
                        <span>Score: </span>
                        <span id="score">0</span>
                    </div>
                    <div class="question-number">
                        Question <span id="question-num">1</span>/<span id="total-questions">5</span>
                    </div>
                </div>
                <div class="question-area">
                    <div class="question-image" id="question-display">ا</div>
                    <p class="question-text">What is this?</p>
                </div>
                <div class="options-container" id="options-container">
                    <!-- Options will be generated by JavaScript -->
                </div>
                <div class="game-feedback" id="game-feedback"></div>
                <div class="game-controls">
                    <button class="btn btn-primary" id="restart-game-btn">🔄 Play Again</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
